MEMORY {
    ZP:     start = $00C0, size = $0020, type = rw, define = yes;
    STACK:  start = $0100, size = $0100, type = rw, define = yes;
    SVECS:  start = $0200, size = $0020, type = rw, define = yes;                       # CHANGE!
    SRAM:   start = $0220, size = $00E0, type = rw, define = yes;                       # CHANGE!
    ROM:    start = $F000, size = $0C00, type = rw, define = yes, file = %O, fill=yes;
    PAD:    start = $FC00, size = $0300, type = ro, file = %O, fill=yes, fillval= $A5;
    ROM2:   start = $FF00, size = $00FA, type = ro, define = yes, file = %O, fill=yes;
    VECS:   start = $FFF0, size = $0006, type = ro, define = yes, file = %O, fill=yes;

}
SEGMENTS {
    ZEROPAGE:   load = ZP,  type = zp;    
    BSS:        load = SRAM, type = bss, define=yes;
    CODE:       load = ROM, type = ro;
    RODATA:     load = ROM, type = ro;
    CODE2:      load = ROM2, type = ro;
    VECTORS:    load = VECS, type = ro;
}
FEATURES {
}
SYMBOLS {
}


